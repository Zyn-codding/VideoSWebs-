<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VideoSWebs — Share Your Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0a0f 0%, #1a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: rgba(20, 15, 20, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 80, 80, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-upload {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-upload:hover {
            transform: scale(1.02);
        }

        .btn-dev {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-dev:hover {
            background: rgba(255, 215, 0, 0.1);
            border-color: gold;
            color: gold;
        }

        .btn-dev.active {
            background: rgba(255, 215, 0, 0.15);
            border-color: gold;
            color: gold;
        }

        .btn-critic {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-critic:hover {
            background: rgba(255, 100, 100, 0.1);
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .main-content {
            margin: 20px 0;
        }

        .welcome-text h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .welcome-text p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 24px;
        }

        .code-input-area {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .code-input-area input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .code-input-area input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }

        .code-input-area button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .code-input-area button:hover {
            transform: scale(0.96);
        }

        .upload-area {
            display: none;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 60px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            min-height: 200px;
        }

        .upload-area.show {
            display: block;
        }

        .upload-area.dragover {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }

        .upload-area .upload-icon {
            font-size: 48px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 16px;
        }

        .upload-area .upload-text {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-area .preview-container {
            margin-top: 16px;
        }

        .upload-area .preview-container video,
        .upload-area .preview-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 16px;
        }

        .upload-result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .upload-result.show {
            display: block;
        }

        .upload-result .done-text {
            font-size: 18px;
            font-weight: 600;
            color: #00ff88;
            margin-bottom: 12px;
        }

        .upload-result .share-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
        }

        .upload-result .code-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .upload-result .code-display {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #00ccff;
            background: rgba(0,0,0,0.3);
            padding: 8px 20px;
            border-radius: 12px;
            font-family: monospace;
        }

        .copy-btn {
            padding: 8px 20px;
            background: linear-gradient(135deg, #00ccff, #0066ff);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .copy-btn:hover {
            transform: scale(0.96);
        }

        .viewer-area {
            display: none;
            margin-top: 20px;
        }

        .viewer-area.show {
            display: block;
        }

        .viewer-area video,
        .viewer-area img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .viewer-area .video-info {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .dev-panel {
            display: none;
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 215, 0, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .dev-panel.show {
            display: block;
        }

        .dev-panel .dev-title {
            color: gold;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .dev-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .dev-item .dev-code {
            color: #00ccff;
            font-weight: 600;
        }

        .dev-item .dev-type {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .dev-item .dev-view-btn {
            padding: 4px 12px;
            background: rgba(0, 204, 255, 0.2);
            border: none;
            border-radius: 20px;
            color: #00ccff;
            cursor: pointer;
            font-size: 11px;
        }

        .critic-area {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .critic-area.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .critic-area textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            resize: vertical;
            min-height: 100px;
            outline: none;
            transition: all 0.2s;
        }

        .critic-area textarea:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.1);
        }

        .critic-area .critic-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            justify-content: flex-end;
        }

        .critic-area .btn-send-critic {
            padding: 10px 24px;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .critic-area .btn-send-critic:hover {
            transform: scale(0.96);
        }

        .critic-area .btn-cancel-critic {
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s;
        }

        .critic-area .btn-cancel-critic:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            display: none;
            z-index: 999;
        }

        .toast.show {
            display: block;
            animation: toastFade 0.3s ease;
        }

        @keyframes toastFade {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-upload-btn {
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-upload-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .export-import-area {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .export-import-btn {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .export-import-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            .header h1 { font-size: 22px; }
            .btn-upload { font-size: 12px; padding: 8px 16px; }
            .welcome-text h2 { font-size: 28px; }
            .code-input-area { flex-direction: column; }
            .upload-area { padding: 40px 16px; }
            .header-right { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VideoSWebs</h1>
        <div class="header-right">
            <button class="btn-critic" id="criticBtn"><i class="fas fa-comment"></i> Kritik</button>
            <button class="btn-dev" id="devBtn"><i class="fas fa-code"></i> Dev</button>
            <button class="btn-upload" id="uploadBtn"><i class="fas fa-upload"></i> Upload Video!</button>
        </div>
    </div>

    <div class="main-content">
        <!-- Welcome & Input Code -->
        <div id="welcomeView" class="welcome-text">
            <h2>WELCOME TO VideoSWebs!</h2>
            <p>You can view or even upload videos to this website and others can view them through the code you share!</p>
            <div class="code-input-area">
                <input type="text" id="codeInput" placeholder="Enter the code here to view the video!">
                <button id="viewBtn"><i class="fas fa-play"></i> View</button>
            </div>
            <div class="export-import-area">
                <button class="export-import-btn" id="exportBtn"><i class="fas fa-download"></i> Export Data</button>
                <button class="export-import-btn" id="importBtn"><i class="fas fa-upload"></i> Import Data</button>
                <input type="file" id="importFile" accept=".json" style="display:none;">
            </div>
        </div>

        <!-- Upload Area -->
        <div id="uploadArea" class="upload-area">
            <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
            <div class="upload-text">Click anywhere to drop video/photo</div>
            <input type="file" id="fileInput" accept="video/*,image/*">
            <div id="previewContainer" class="preview-container"></div>
            <button class="close-upload-btn" id="closeUploadBtn"><i class="fas fa-times"></i> Cancel</button>
        </div>

        <!-- Upload Result -->
        <div id="uploadResult" class="upload-result">
            <div class="done-text"><i class="fas fa-check-circle"></i> Done!</div>
            <div class="share-text">Share your video with your friends so they can watch it!</div>
            <div class="code-box">
                <span class="code-display" id="resultCode">------</span>
                <button class="copy-btn" id="copyCodeBtn"><i class="fas fa-copy"></i> Copy Code</button>
            </div>
        </div>

        <!-- Viewer Area -->
        <div id="viewerArea" class="viewer-area">
            <div id="viewerContent"></div>
            <div class="video-info" id="viewerInfo"></div>
        </div>

        <!-- Dev Panel -->
        <div id="devPanel" class="dev-panel">
            <div class="dev-title"><i class="fas fa-crown"></i> Developer Mode — All Uploads</div>
            <div id="devList"></div>
        </div>

        <!-- Critic Area -->
        <div id="criticArea" class="critic-area">
            <textarea id="criticInput" placeholder="Write your criticism so the developer knows!"></textarea>
            <div class="critic-actions">
                <button class="btn-cancel-critic" id="cancelCriticBtn">Cancel</button>
                <button class="btn-send-critic" id="sendCriticBtn"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const STORAGE_KEY = 'videys_uploads';
    const DEV_CODE = 'ZetsuDeveloper001IndonesianWebsiteDeployer';
    const OWNER_ID = '8246027862';
    const BOT_TOKEN = '8627394983:AAFPZR6Elkjf70Ck331gCFZhDjp2Cr_itVk';
    let uploads = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    let isDevMode = false;
    let currentUploadCode = '';

    function generateCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) {
            code += chars[Math.floor(Math.random() * chars.length)];
        }
        return code;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function renderDevPanel() {
        const list = document.getElementById('devList');
        const codes = Object.keys(uploads);
        if (codes.length === 0) {
            list.innerHTML = '<div style="color:rgba(255,255,255,0.3); font-size:13px; padding:12px;">No uploads yet.</div>';
            return;
        }
        list.innerHTML = codes.map(code => {
            const data = uploads[code];
            const type = data.startsWith('data:video/') ? '🎬 Video' : data.startsWith('data:image/') ? '🖼️ Image' : '📄 Unknown';
            return `
                <div class="dev-item">
                    <span class="dev-code">${code}</span>
                    <span class="dev-type">${type}</span>
                    <button class="dev-view-btn" data-code="${code}">View</button>
                </div>
            `;
        }).join('');

        list.querySelectorAll('.dev-view-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const code = this.dataset.code;
                viewByCode(code);
            });
        });
    }

    function viewByCode(code) {
        const data = uploads[code];
        if (!data) {
            showToast('❌ No data found for code: ' + code);
            return;
        }

        const viewer = document.getElementById('viewerArea');
        const content = document.getElementById('viewerContent');
        const info = document.getElementById('viewerInfo');

        if (data.startsWith('data:video/')) {
            content.innerHTML = `<video controls src="${data}"></video>`;
            info.textContent = '🎬 Video • Code: ' + code;
        } else if (data.startsWith('data:image/')) {
            content.innerHTML = `<img src="${data}" alt="Uploaded image">`;
            info.textContent = '🖼️ Image • Code: ' + code;
        }

        viewer.classList.add('show');
        document.getElementById('welcomeView').style.display = 'none';
        showToast('✅ Loaded: ' + code);
    }

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const dataUrl = event.target.result;
            const code = generateCode();
            currentUploadCode = code;
            uploads[code] = dataUrl;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(uploads));

            const preview = document.getElementById('previewContainer');
            if (file.type.startsWith('video/')) {
                preview.innerHTML = `<video controls src="${dataUrl}"></video>`;
            } else if (file.type.startsWith('image/')) {
                preview.innerHTML = `<img src="${dataUrl}" alt="Uploaded image">`;
            }

            document.getElementById('uploadArea').classList.remove('show');
            document.getElementById('uploadResult').classList.add('show');
            document.getElementById('resultCode').textContent = code;

            document.getElementById('copyCodeBtn').onclick = function() {
                navigator.clipboard.writeText(code).then(() => {
                    showToast('✅ Code copied! Share it with your friends.');
                }).catch(() => {
                    showToast('📋 Code: ' + code);
                });
            };

            showToast('✅ Upload successful! Code: ' + code);

            if (isDevMode) renderDevPanel();
        };
        reader.readAsDataURL(file);
    }

    // Upload button → trigger file input
    document.getElementById('uploadBtn').addEventListener('click', () => {
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('uploadArea').classList.add('show');
        document.getElementById('uploadResult').classList.remove('show');
        document.getElementById('viewerArea').classList.remove('show');
        document.getElementById('fileInput').click();
    });

    // File input change
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = this.files[0];
        if (!file) return;
        handleFile(file);
        this.value = '';
    });

    // Cancel upload
    document.getElementById('closeUploadBtn').addEventListener('click', () => {
        document.getElementById('uploadArea').classList.remove('show');
        document.getElementById('welcomeView').style.display = 'block';
        document.getElementById('previewContainer').innerHTML = '';
        document.getElementById('fileInput').value = '';
    });

    // View button
    document.getElementById('viewBtn').addEventListener('click', function() {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code) {
            showToast('❌ Please enter a code!');
            return;
        }
        viewByCode(code);
        document.getElementById('codeInput').value = '';
    });

    // Enter key on input
    document.getElementById('codeInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('viewBtn').click();
        }
    });

    // Dev button — check code via prompt
    document.getElementById('devBtn').addEventListener('click', function() {
        if (isDevMode) {
            isDevMode = false;
            this.classList.remove('active');
            document.getElementById('devPanel').classList.remove('show');
            showToast('🔒 Developer mode disabled.');
            return;
        }

        const input = prompt('Enter developer code:');
        if (input === DEV_CODE) {
            isDevMode = true;
            this.classList.add('active');
            document.getElementById('devPanel').classList.add('show');
            renderDevPanel();
            showToast('✅ Developer mode activated!');
        } else if (input !== null) {
            showToast('❌ Invalid developer code.');
        }
    });

    // Critic button
    document.getElementById('criticBtn').addEventListener('click', function() {
        const area = document.getElementById('criticArea');
        area.classList.toggle('show');
        if (area.classList.contains('show')) {
            document.getElementById('criticInput').focus();
        }
    });

    // Cancel critic
    document.getElementById('cancelCriticBtn').addEventListener('click', function() {
        document.getElementById('criticArea').classList.remove('show');
        document.getElementById('criticInput').value = '';
    });

    // Send critic via Telegram
    document.getElementById('sendCriticBtn').addEventListener('click', async function() {
        const msg = document.getElementById('criticInput').value.trim();
        if (!msg) {
            showToast('❌ Please write something first!');
            return;
        }

        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = {
            chat_id: OWNER_ID,
            text: `📩 *VideoSWebs Critic*\n\n${msg}`,
            parse_mode: 'Markdown'
        };

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.ok) {
                showToast('✅ Criticism sent! Thank you.');
                document.getElementById('criticArea').classList.remove('show');
                document.getElementById('criticInput').value = '';
            } else {
                showToast('❌ Failed to send. Try again later.');
            }
        } catch (e) {
            showToast('❌ Error sending criticism.');
        }
    });

    // Export / Import
    document.getElementById('exportBtn').addEventListener('click', function() {
        const data = JSON.stringify(uploads, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'VideoSWebs_Backup.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('✅ Data exported!');
    });

    document.getElementById('importBtn').addEventListener('click', function() {
        document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const importedData = JSON.parse(event.target.result);
                if (typeof importedData === 'object' && importedData !== null) {
                    uploads = importedData;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(uploads));
                    if (isDevMode) renderDevPanel();
                    showToast('✅ Data imported successfully!');
                } else {
                    showToast('❌ Invalid data format.');
                }
            } catch (err) {
                showToast('❌ Error importing data.');
            }
        };
        reader.readAsText(file);
        this.value = '';
    });

    // Drag and drop
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            handleFile(files[0]);
        }
    });
</script>
</body>
</html>
