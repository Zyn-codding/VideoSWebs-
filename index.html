<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VideoSWebs — Share Your Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0a0f 0%, #1a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: rgba(20, 15, 20, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 32px 24px;
            border: 1px solid rgba(255, 80, 80, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 400px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .btn-upload {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-upload:hover {
            transform: scale(1.02);
        }

        .main-content {
            margin: 20px 0;
        }

        .welcome-text h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .welcome-text p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            line-height: 1.6;
            max-width: 500px;
            margin: 0 auto 24px;
        }

        .code-input-area {
            display: flex;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }

        .code-input-area input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .code-input-area input:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.2);
        }

        .code-input-area button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #ff6b6b, #ff2d55);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .code-input-area button:hover {
            transform: scale(0.96);
        }

        .upload-area {
            display: none;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 60px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            min-height: 200px;
        }

        .upload-area.show {
            display: block;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }

        .upload-area .upload-icon {
            font-size: 48px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 16px;
        }

        .upload-area .upload-text {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .upload-area .preview-container {
            margin-top: 16px;
        }

        .upload-area .preview-container video,
        .upload-area .preview-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 16px;
        }

        .upload-result {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .upload-result.show {
            display: block;
        }

        .upload-result .done-text {
            font-size: 18px;
            font-weight: 600;
            color: #00ff88;
            margin-bottom: 12px;
        }

        .upload-result .share-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 16px;
        }

        .copy-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #00ccff, #0066ff);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            transform: scale(0.96);
        }

        .viewer-area {
            display: none;
            margin-top: 20px;
        }

        .viewer-area.show {
            display: block;
        }

        .viewer-area video,
        .viewer-area img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .viewer-area .video-info {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            display: none;
            z-index: 999;
        }

        .toast.show {
            display: block;
            animation: toastFade 0.3s ease;
        }

        @keyframes toastFade {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .close-upload-btn {
            margin-top: 12px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-upload-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            .header h1 { font-size: 22px; }
            .btn-upload { font-size: 12px; padding: 8px 16px; }
            .welcome-text h2 { font-size: 28px; }
            .code-input-area { flex-direction: column; }
            .upload-area { padding: 40px 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VideoSWebs</h1>
        <button class="btn-upload" id="uploadBtn"><i class="fas fa-upload"></i> Upload Video!</button>
    </div>

    <div class="main-content">
        <!-- Welcome & Input Code -->
        <div id="welcomeView" class="welcome-text">
            <h2>WELCOME TO VideoSWebs!</h2>
            <p>You can view or even upload videos to this website and others can view them through the code you share!</p>
            <div class="code-input-area">
                <input type="text" id="codeInput" placeholder="Enter the code here to view the video!">
                <button id="viewBtn"><i class="fas fa-play"></i> View</button>
            </div>
        </div>

        <!-- Upload Area -->
        <div id="uploadArea" class="upload-area">
            <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
            <div class="upload-text">Click anywhere to drop video/photo</div>
            <input type="file" id="fileInput" accept="video/*,image/*">
            <div id="previewContainer" class="preview-container"></div>
            <button class="close-upload-btn" id="closeUploadBtn"><i class="fas fa-times"></i> Cancel</button>
        </div>

        <!-- Upload Result -->
        <div id="uploadResult" class="upload-result">
            <div class="done-text"><i class="fas fa-check-circle"></i> Done!</div>
            <div class="share-text">Share your video with your friends so they can watch it!</div>
            <button class="copy-btn" id="copyCodeBtn"><i class="fas fa-copy"></i> Copy Code</button>
        </div>

        <!-- Viewer Area -->
        <div id="viewerArea" class="viewer-area">
            <div id="viewerContent"></div>
            <div class="video-info" id="viewerInfo"></div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const STORAGE_KEY = 'videys_uploads';
    let uploads = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

    function generateCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) {
            code += chars[Math.floor(Math.random() * chars.length)];
        }
        return code;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = function(event) {
            const dataUrl = event.target.result;
            const code = generateCode();
            uploads[code] = dataUrl;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(uploads));

            const preview = document.getElementById('previewContainer');
            if (file.type.startsWith('video/')) {
                preview.innerHTML = `<video controls src="${dataUrl}"></video>`;
            } else if (file.type.startsWith('image/')) {
                preview.innerHTML = `<img src="${dataUrl}" alt="Uploaded image">`;
            }

            document.getElementById('uploadArea').classList.remove('show');
            document.getElementById('uploadResult').classList.add('show');

            document.getElementById('copyCodeBtn').onclick = function() {
                navigator.clipboard.writeText(code).then(() => {
                    showToast('✅ Code copied! Share it with your friends.');
                }).catch(() => {
                    showToast('📋 Code: ' + code);
                });
            };

            showToast('✅ Upload successful! Code: ' + code);
        };
        reader.readAsDataURL(file);
    }

    // Upload button → trigger file input
    document.getElementById('uploadBtn').addEventListener('click', () => {
        document.getElementById('welcomeView').style.display = 'none';
        document.getElementById('uploadArea').classList.add('show');
        document.getElementById('uploadResult').classList.remove('show');
        document.getElementById('viewerArea').classList.remove('show');
        document.getElementById('fileInput').click(); // langsung buka file picker
    });

    // File input change
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = this.files[0];
        if (!file) return;
        handleFile(file);
        this.value = ''; // reset biar bisa upload ulang
    });

    // Cancel upload
    document.getElementById('closeUploadBtn').addEventListener('click', () => {
        document.getElementById('uploadArea').classList.remove('show');
        document.getElementById('welcomeView').style.display = 'block';
        document.getElementById('previewContainer').innerHTML = '';
        document.getElementById('fileInput').value = '';
    });

    // View button
    document.getElementById('viewBtn').addEventListener('click', function() {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if (!code) {
            showToast('❌ Please enter a code!');
            return;
        }

        const data = uploads[code];
        if (!data) {
            showToast('❌ Invalid code! No video found.');
            return;
        }

        const viewer = document.getElementById('viewerArea');
        const content = document.getElementById('viewerContent');
        const info = document.getElementById('viewerInfo');

        if (data.startsWith('data:video/')) {
            content.innerHTML = `<video controls src="${data}"></video>`;
            info.textContent = '🎬 Video • Code: ' + code;
        } else if (data.startsWith('data:image/')) {
            content.innerHTML = `<img src="${data}" alt="Uploaded image">`;
            info.textContent = '🖼️ Image • Code: ' + code;
        }

        viewer.classList.add('show');
        document.getElementById('welcomeView').style.display = 'none';
        showToast('✅ Video loaded!');
    });

    // Enter key on input
    document.getElementById('codeInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            document.getElementById('viewBtn').click();
        }
    });

    // Drag and drop (desktop only)
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            handleFile(files[0]);
        }
    });
</script>
</body>
</html>
